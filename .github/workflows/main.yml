name: Update profile SVG

on:
  schedule:
    - cron: "0 0 * * 0"      # weekly (every 7 days), Sunday 00:00 UTC
  workflow_dispatch:          # manual "Run workflow" button
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install requests python-dateutil lxml

      - name: Generate dark_mode.svg
        env:
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}   # fine-grained PAT, repo read + metadata
          USER_NAME: NPX2218
        run: python build_readme.py

      - name: Commit refreshed stats
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dark_mode.svg cache/
          git diff --staged --quiet || git commit -m "chore: refresh profile stats"
          git push
