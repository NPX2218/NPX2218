# mypy configuration — run:  python -m mypy .
#
# strict = the full strict preset (turns on ~15 checks at once), the most
# important being:
#   disallow_untyped_defs   every function must have annotations
#   check_untyped_defs      actually type-check the *body* of every function
#   disallow_any_generics   `list` alone is banned; write `list[str]`
#   warn_return_any         flag returning an untyped value from a typed fn
#   no_implicit_optional    a param can't secretly become None-able
# We intentionally do NOT pin python_version, so mypy uses the venv's
# interpreter (currently 3.14) — keeps it honest with what actually runs.
[mypy]
strict = true

# Never type-check the virtualenv itself.
exclude = (?x)(^venv/ | ^\.venv/)
